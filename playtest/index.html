<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsuLife — プレイテスト版</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', 'Meiryo', sans-serif; background: #0d0d1a; color: #dde; min-height: 100vh; font-size: 14px; }
#app { max-width: 980px; margin: 0 auto; padding: 16px; }

h1 { color: #e94560; font-size: 22px; text-align: center; margin-bottom: 16px; }
h2 { color: #7ec8e3; font-size: 16px; margin-bottom: 10px; }
h3 { color: #aad; font-size: 14px; margin-bottom: 8px; }

.panel { background: #161630; border: 1px solid #2a2a50; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
.panel-title { font-weight: bold; color: #7ec8e3; margin-bottom: 10px; border-bottom: 1px solid #2a2a50; padding-bottom: 6px; }

button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: opacity 0.15s; }
button:hover:not(:disabled) { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: default; }
.btn-primary  { background: #e94560; color: #fff; }
.btn-confirm  { background: #27ae60; color: #fff; }
.btn-action   { background: #2980b9; color: #fff; }
.btn-warn     { background: #e67e22; color: #fff; }
.btn-back     { background: #2a2a50; color: #aab; border: 1px solid #3a3a70; }
.btn-sm       { padding: 4px 12px; font-size: 12px; }

/* Grid layouts */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* Setup */
.lifestyle-card { border: 2px solid #2a2a50; border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
.lifestyle-card:hover { border-color: #7ec8e3; }
.lifestyle-card.selected { border-color: #e94560; background: #1f1040; }
.lifestyle-name { font-weight: bold; font-size: 15px; }
.lifestyle-diff { color: #f39c12; font-size: 12px; margin: 4px 0; }
.lifestyle-assets { color: #27ae60; font-size: 12px; }
.lifestyle-desc { color: #99a; font-size: 12px; margin-top: 6px; }

/* Goal cards */
.goal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.goal-card { border: 2px solid #2a2a50; border-radius: 6px; padding: 10px; cursor: pointer; transition: border-color 0.15s; }
.goal-card:hover { border-color: #7ec8e3; }
.goal-card.selected { border-color: #27ae60; background: #0a2018; }
.goal-type { display: inline-block; font-size: 11px; font-weight: bold; padding: 1px 6px; border-radius: 3px; margin-bottom: 4px; }
.goal-type-A { background: #1a4080; color: #7ec8e3; }
.goal-type-B { background: #401a1a; color: #e94560; }
.goal-type-C { background: #3a2010; color: #f39c12; }
.goal-title-text { font-size: 13px; font-weight: bold; color: #dde; }
.goal-cost { font-size: 11px; color: #f39c12; margin-top: 4px; }
.goal-note { font-size: 11px; color: #778; margin-top: 4px; }
.goal-cat { font-size: 11px; color: #56a; margin-top: 2px; }

/* Insurance */
.ins-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.ins-table th { background: #1f1f40; color: #7ec8e3; padding: 6px 8px; text-align: left; }
.ins-table td { padding: 6px 8px; border-bottom: 1px solid #2a2a50; }
.ins-table tr:hover td { background: #1a1a38; }
.ins-table .enrolled td { background: #0a2018 !important; }
.premium-up { color: #e67e22; }

/* Turn / Event */
.event-banner { border-radius: 8px; padding: 14px 18px; margin-bottom: 14px; }
.event-banner .ev-cat { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
.event-banner .ev-title { font-size: 20px; font-weight: bold; margin: 4px 0; }
.event-banner .ev-desc { font-size: 13px; color: #ccc; }
.event-banner .ev-amount { font-size: 18px; font-weight: bold; margin-top: 8px; }

.cat-medical    { background: #2a0a0a; border-left: 4px solid #e74c3c; }
.cat-accident   { background: #2a1500; border-left: 4px solid #e67e22; }
.cat-disability { background: #1a0a2a; border-left: 4px solid #8e44ad; }
.cat-care       { background: #001a18; border-left: 4px solid #16a085; }
.cat-asset      { background: #001020; border-left: 4px solid #2980b9; }
.cat-lucky      { background: #1a1500; border-left: 4px solid #f39c12; }

.results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.results-table th { background: #1f1f40; color: #7ec8e3; padding: 6px 8px; text-align: right; }
.results-table th:first-child { text-align: left; }
.results-table td { padding: 6px 8px; border-bottom: 1px solid #2a2a50; text-align: right; }
.results-table td:first-child { text-align: left; }
.results-table .neg { color: #e94560; }
.results-table .pos { color: #27ae60; }
.results-table .neutral { color: #aaa; }

.score-row { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 6px; background: #161630; margin-bottom: 8px; }
.score-rank { font-size: 24px; font-weight: bold; color: #f39c12; width: 32px; }
.score-name { font-size: 16px; font-weight: bold; flex: 1; }
.score-total { font-size: 24px; font-weight: bold; color: #e94560; }
.score-detail { font-size: 12px; color: #889; }

.badge-achieved { background: #27ae60; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 3px; }
.badge-partial  { background: #e67e22; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 3px; }
.badge-fail     { background: #555; color: #ccc; font-size: 11px; padding: 1px 6px; border-radius: 3px; }

.stage-bar { display: flex; gap: 2px; margin-bottom: 14px; }
.stage-pip { flex: 1; height: 6px; border-radius: 3px; background: #2a2a50; }
.stage-pip.done { background: #27ae60; }
.stage-pip.current { background: #e94560; }

.info-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
.info-item { font-size: 13px; }
.info-item span { color: #7ec8e3; font-weight: bold; }

.tag { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-right: 4px; }
.tag-ins { background: #1a4080; color: #7ec8e3; }

.player-col { min-width: 120px; }
.sep { border: none; border-top: 1px solid #2a2a50; margin: 12px 0; }
input[type=text] { background: #1a1a38; border: 1px solid #3a3a60; border-radius: 4px; color: #dde; padding: 6px 10px; font-size: 14px; width: 100%; }
input[type=number] { background: #1a1a38; border: 1px solid #3a3a60; border-radius: 4px; color: #dde; padding: 6px 10px; font-size: 14px; width: 80px; }
select { background: #1a1a38; border: 1px solid #3a3a60; border-radius: 4px; color: #dde; padding: 6px 10px; font-size: 14px; }
label { font-size: 13px; color: #aab; }
.err { color: #e94560; font-size: 13px; }
.tip { color: #778; font-size: 12px; }

/* ── Player Detail Modal ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999; cursor:pointer; }
.modal-panel {
  position:fixed; top:0; right:0; width:360px; max-width:100vw; height:100dvh;
  overflow-y:auto; background:#1a1a38; border-left:2px solid #3a3a70;
  z-index:1000; padding:16px; box-shadow:-4px 0 24px rgba(0,0,0,0.5);
}
@media(max-width:480px){
  .modal-panel {
    width:100vw; top:auto; bottom:0; height:82dvh;
    border-left:none; border-top:2px solid #3a3a70; border-radius:14px 14px 0 0;
  }
}
.modal-section-title {
  color:#7ec8e3; font-size:11px; font-weight:bold; letter-spacing:1px;
  margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #2a2a50;
}

/* ── Expense Breakdown Accordion ── */
.breakdown-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 12px; background:#1f1f40; border-radius:6px; cursor:pointer;
  margin-top:6px; font-size:13px; user-select:none; border:1px solid #2a2a50;
}
.breakdown-header:hover { background:#282856; }
.breakdown-body {
  background:#0d0d20; border:1px solid #2a2a50; border-top:none;
  border-radius:0 0 6px 6px; padding:10px 12px;
}
.breakdown-item {
  display:flex; justify-content:space-between; align-items:center;
  font-size:12px; padding:3px 0; border-bottom:1px dashed #1e1e40;
}
.breakdown-item:last-child { border-bottom:none; }
.breakdown-sub { margin-left:14px; color:#99a; font-size:11px; }

/* ── Player name as clickable button ── */
.player-name-btn {
  background:none; border:none; color:#dde; font-size:14px; cursor:pointer;
  padding:0 4px 0 0; text-decoration:underline dotted; text-decoration-color:#3a3a70;
  line-height:1.4;
}
.player-name-btn:hover { color:#7ec8e3; text-decoration-color:#7ec8e3; }
.player-name-hint { font-size:10px; color:#556; vertical-align:middle; }

/* ── Before-After Animation Overlay ── */
@keyframes baFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>

<!-- ===== GAME ENGINE (inline copy with fixes applied) ===== -->
<script>
"use strict";
// ─── initGame ───
function initGame({ lifestyleId, playerIds, lifestylesData, stagesData }) {
  const lifestyle = lifestylesData.lifestyles.find(l => l.id === lifestyleId);
  if (!lifestyle) throw new Error("ライフスタイルが見つかりません: " + lifestyleId);
  const players = playerIds.map(id => ({
    id, assets: lifestyle.initialAssets, insurances: [], goals: [],
    turnHistory: [], goalMissedEvents: [], paidOptionalCosts: []
  }));
  return { lifestyle, players, currentStageIndex: 0, currentTurnInStage: 0, globalTurn: 0, phase: "mandatoryStop", log: [] };
}

// ─── setPlayerGoals ───
function setPlayerGoals(player, goalSelections, goalsData) {
  if (goalSelections.length < 2) throw new Error("目的カードは最低2枚選択してください。");
  player.goals = goalSelections.map(sel => {
    const goal = goalsData.goalCards.find(g => g.id === sel.goalId);
    if (!goal) throw new Error("目的カードが見つかりません: " + sel.goalId);
    return { goalId: sel.goalId, monthlySpend: sel.monthlySpend ?? goal.defaultMonthlySpend };
  });
}

// ─── reviewInsurance ───
function reviewInsurance(player, insuranceIdsToAdd, insuranceIdsToCancle, stopId, insuranceData, stagesData) {
  player.insurances = player.insurances.filter(i => !insuranceIdsToCancle.includes(i.insuranceId));
  const multiplierEntry = insuranceData.timingMultipliers.find(t => t.stopId === stopId);
  if (!multiplierEntry) throw new Error("タイミング乗数が見つかりません: " + stopId);
  const multiplier = multiplierEntry.multiplier;
  for (const insId of insuranceIdsToAdd) {
    if (player.insurances.some(i => i.insuranceId === insId)) continue;
    const ins = insuranceData.insuranceTypes.find(i => i.id === insId);
    if (!ins) throw new Error("保険が見つかりません: " + insId);
    if (ins.minEnrollmentStop) {
      const minStop = insuranceData.timingMultipliers.find(t => t.stopId === ins.minEnrollmentStop);
      if (minStop && multiplierEntry.multiplier < minStop.multiplier)
        throw new Error(ins.name + "は" + minStop.stopName + "以降から加入できます。");
    }
    if (ins.maxEnrollmentStop) {
      const maxStop = insuranceData.timingMultipliers.find(t => t.stopId === ins.maxEnrollmentStop);
      if (maxStop && multiplierEntry.multiplier > maxStop.multiplier)
        throw new Error(ins.name + "はこのタイミングでは加入できません。");
    }
    const monthlyPremium = Math.round(ins.baseMonthlyPremium * multiplier);
    const record = { insuranceId: insId, monthlyPremium, enrolledAtStop: stopId };
    if (insId === "personalPension" && ins.pensionBonusByStop)
      record.additionalMonthlyIncome = ins.pensionBonusByStop[stopId] ?? ins.additionalMonthlyIncome ?? 0;
    if (insId === "wholeLife" && ins.deathBenefitByStop)
      record.deathBenefit = ins.deathBenefitByStop[stopId] ?? 0;
    player.insurances.push(record);
  }
}

// ─── completeMandatoryStop ───
function completeMandatoryStop(gameState) { gameState.phase = "turn"; }

// ─── rollEventCategory ───
function rollEventCategory(lifestyle, stageId, rng) {
  rng = rng || Math.random;
  const probs = lifestyle.stageProbabilities[stageId];
  const roll = rng() * 100;
  let cum = 0;
  for (const cat of ["medical","accident","disability","care","asset","lucky"]) {
    cum += probs[cat] || 0;
    if (roll < cum) return cat;
  }
  return "lucky";
}

// ─── drawEventCard ───
function drawEventCard(category, stageId, eventsData, rng) {
  rng = rng || Math.random;
  const weights = { light:3, medium:2, heavy:1 };
  let candidates = eventsData.events.filter(ev =>
    ev.category === category && (ev.availableStages === null || ev.availableStages.includes(stageId))
  );
  if (candidates.length === 0) candidates = eventsData.events.filter(ev => ev.category === category);
  const pool = candidates.flatMap(ev => Array(weights[ev.severity] || 1).fill(ev));
  return pool[Math.floor(rng() * pool.length)];
}

// ─── income / expenses ───
// ─── calculateAnnualIncome ───
function calculateAnnualIncome(player, stage, insuranceData) {
  let monthly = stage.monthlyIncome;
  const pensionRecord = player.insurances.find(i => i.insuranceId === "personalPension");
  if (pensionRecord && ["stage5","stage6"].includes(stage.id))
    monthly += pensionRecord.additionalMonthlyIncome ?? 0;
  return (monthly * 12) / 10000;
}
function calculateAnnualBasicExpense(stage) {
  return stage.annualBasicExpense || 0; // 万円/年
}
function calculateAnnualPremium(player) {
  return (player.insurances.reduce((s, i) => s + i.monthlyPremium, 0) * 12) / 10000; // 万円/年
}
function calculateAnnualGoalSpend(player, stageId, goalsData) {
  let monthly = 0;
  for (const pg of player.goals) {
    const goal = goalsData.goalCards.find(g => g.id === pg.goalId);
    if (goal && goal.hasRecurringCost && goal.activeStages.includes(stageId)) monthly += pg.monthlySpend;
  }
  return (monthly * 12) / 10000; // 万円/年
}
function payOptionalCost(player, amount) {
  player.assets = Math.round((player.assets - amount) * 10) / 10;
}

// ─── applyInsuranceToEvent ───
function applyInsuranceToEvent(baseDamage, category, isCancer, player, insuranceData) {
  const applicable = player.insurances
    .map(pi => insuranceData.insuranceTypes.find(i => i.id === pi.insuranceId))
    .filter(ins => {
      if (!ins || !ins.coverageCategories.includes(category)) return false;
      if (ins.coverageCondition === "cancer_only" && !isCancer) return false;
      return true;
    });
  if (applicable.length === 0) return { baseDamage, actualDamage: baseDamage, insurancePayout: 0, totalReductionRate: 0, appliedInsurances: [] };
  const cap = Math.max(...applicable.map(i => i.combinedReductionCap));
  const rate = Math.min(applicable.reduce((s, i) => s + i.reductionRate, 0), cap);
  const actualDamage = Math.round(baseDamage * (1 - rate));
  return {
    baseDamage,
    actualDamage,
    insurancePayout: baseDamage - actualDamage,
    totalReductionRate: rate,
    appliedInsurances: applicable.map(i => i.name)
  };
}

// ─── getEventAmount ───
function getEventAmount(eventCard, stageId) {
  if (eventCard.stageAmounts && eventCard.stageAmounts[stageId] !== undefined) {
    return eventCard.stageAmounts[stageId];
  }
  return eventCard.amount;
}

// ─── processTurn ───
function processTurn(gameState, stagesData, eventsData, goalsData, insuranceData, rng) {
  rng = rng || Math.random;
  const stage = stagesData.stages[gameState.currentStageIndex];
  const years = stage.yearsPerTurn || 1;
  const category = rollEventCategory(gameState.lifestyle, stage.id, rng);
  const eventCard = drawEventCard(category, stage.id, eventsData, rng);

  const playerResults = gameState.players.map(player => {
    const annualIncome      = calculateAnnualIncome(player, stage, insuranceData);
    const annualBasicExpense = calculateAnnualBasicExpense(stage);
    const annualPremium     = calculateAnnualPremium(player);
    const annualGoalSpend   = calculateAnnualGoalSpend(player, stage.id, goalsData);
    const income      = annualIncome      * years;
    const basicExpense = annualBasicExpense * years;
    const premium     = annualPremium     * years;
    const goalSpend   = annualGoalSpend   * years;
    const effectiveAmount = getEventAmount(eventCard, stage.id);
    let eventDamage = 0, eventBaseDamage = 0, insurancePayout = 0, reductionRate = 0, appliedIns = [];
    if (effectiveAmount < 0) {
      const r = applyInsuranceToEvent(Math.abs(effectiveAmount), category, eventCard.isCancerEvent, player, insuranceData);
      eventDamage = r.actualDamage; eventBaseDamage = r.baseDamage;
      insurancePayout = r.insurancePayout; reductionRate = r.totalReductionRate; appliedIns = r.appliedInsurances;
    }
    // 保険連動給付イベント: 該当保険加入者のみ給付
    let eventGain = 0;
    if (effectiveAmount > 0) {
      if (eventCard.insuranceBenefit) {
        eventGain = player.insurances.some(pi => pi.insuranceId === eventCard.insuranceBenefit)
          ? effectiveAmount : 0;
      } else {
        eventGain = effectiveAmount;
      }
    }
    const netChange = income - basicExpense - premium - goalSpend - eventDamage + eventGain;
    player.assets = Math.round((player.assets + netChange) * 10) / 10;

    // B/C型目的カードのイベント被弾チェック
    if (effectiveAmount < 0) {
      player.goals.forEach(pg => {
        const goal = goalsData.goalCards.find(g => g.id === pg.goalId);
        if (!goal || goal.requiredInsurance.length === 0) return;
        if (pg.goalId === 'goal_12') return; // 終身保険はゲーム終了時判定
        // このイベントカテゴリが目的カードの必要保険の対象か確認
        const relevant = goal.requiredInsurance.some(rid => {
          const ins = insuranceData.insuranceTypes.find(i => i.id === rid);
          if (!ins) return false;
          if (!ins.coverageCategories.includes(category)) return false;
          if (ins.coverageCondition === 'cancer_only' && !eventCard.isCancerEvent) return false;
          return true;
        });
        if (!relevant) return;
        // 必要保険に未加入 → 被弾記録
        const covered = goal.requiredInsurance.some(rid =>
          player.insurances.some(pi => {
            if (pi.insuranceId !== rid) return false;
            const ins = insuranceData.insuranceTypes.find(i => i.id === rid);
            if (!ins || !ins.coverageCategories.includes(category)) return false;
            if (ins.coverageCondition === 'cancer_only' && !eventCard.isCancerEvent) return false;
            return true;
          })
        );
        if (!covered && !player.goalMissedEvents.includes(pg.goalId)) {
          player.goalMissedEvents.push(pg.goalId);
        }
      });
    }

    const record = { turn: gameState.globalTurn+1, stageId: stage.id, years,
      annualIncome, annualBasicExpense, annualPremium, annualGoalSpend,
      income, basicExpense, premium, goalSpend,
      eventCard, eventBaseDamage, eventDamage, insurancePayout, reductionRate, appliedIns, eventGain, netChange, assetsAfter: player.assets };
    player.turnHistory.push(record);
    return { playerId: player.id, ...record };
  });

  gameState.globalTurn++;
  gameState.currentTurnInStage++;
  if (gameState.currentTurnInStage >= stage.turns) {
    const next = gameState.currentStageIndex + 1;
    if (next >= stagesData.stages.length) {
      gameState.phase = "gameOver";
      gameState.players.forEach(p => {
        const wl = p.insurances.find(i => i.insuranceId === "wholeLife");
        if (wl && wl.deathBenefit > 0) {
          p.assets = Math.round((p.assets + wl.deathBenefit) * 10) / 10;
        }
      });
    } else {
      gameState.currentStageIndex = next;
      gameState.currentTurnInStage = 0;
      gameState.phase = "mandatoryStop";
    }
  }
  return { eventCard, playerResults };
}

// ─── evaluateGoals ───
function evaluateGoals(player, goalsData) {
  return player.goals.map(pg => {
    const goal = goalsData.goalCards.find(g => g.id === pg.goalId);

    // 支出スコア (A型・C型): 0=未達成 / 0.5=一部達成 / 1=達成
    // ・資産がマイナスになったターンあり → 0
    // ・全ターン黒字 かつ 支出がデフォルト未満 → 0.5
    // ・全ターン黒字 かつ 支出がデフォルト以上 → 1
    let spendScore = 1;
    if (goal.hasRecurringCost && goal.activeStages.length > 0) {
      const activeTurns = player.turnHistory.filter(h => goal.activeStages.includes(h.stageId));
      if (activeTurns.length === 0) {
        spendScore = 0; // 対象ステージを未プレイ
      } else if (!activeTurns.every(h => h.assetsAfter >= 0)) {
        spendScore = 0; // 赤字ターンあり → 未達成
      } else if (pg.monthlySpend < goal.defaultMonthlySpend) {
        spendScore = 0.5; // 全ターン黒字だが支出を減額していた → 一部達成
      } else {
        spendScore = 1; // 全ターン黒字 かつ フル支出 → 達成
      }
    }

    // 保険チェック (B型・C型)
    let insLevel = "achieved"; // 保険不要な目的はデフォルト達成
    if (goal.requiredInsurance.length > 0) {
      if (pg.goalId === 'goal_12') {
        // 終身保険はゲーム終了時点で加入しているかだけ判定
        insLevel = player.insurances.some(pi => pi.insuranceId === 'wholeLife')
          ? "achieved" : "notAchieved";
      } else if (player.goalMissedEvents.includes(pg.goalId)) {
        // 関連イベントに無保険で被弾 → 後から加入しても未達成
        insLevel = "notAchieved";
      } else {
        // 関連イベントが発生しなかった → ゲーム終了時の加入状況で準備度を判定
        const insured = goal.requiredInsurance.some(rid =>
          player.insurances.some(pi => pi.insuranceId === rid)
        );
        insLevel = insured ? "achieved" : "partialAchieved";
      }
    }

    // 一時費用チェック (requiredOptionalCost があるカード)
    if (goal.requiredOptionalCost) {
      const paid = player.paidOptionalCosts.includes(goal.requiredOptionalCost);
      if (!paid) {
        // goal_12 は一時費用未払いで未達成、それ以外は一部達成に降格
        if (pg.goalId === 'goal_12') insLevel = "notAchieved";
        else if (insLevel === "achieved") insLevel = "partialAchieved";
      }
    }

    // 総合判定
    let level;
    if (goal.type === "A") {
      // spendScore: 1→達成 / 0.5→一部達成 / 0→未達成
      level = spendScore === 1 ? "achieved" : spendScore === 0.5 ? "partialAchieved" : "notAchieved";
    } else if (goal.type === "B") {
      level = insLevel; // achieved / partialAchieved / notAchieved
    } else { // C型: 支出と保険の両方
      const insScore = insLevel === "achieved" ? 1 : insLevel === "partialAchieved" ? 0.5 : 0;
      const combined = (spendScore + insScore) / 2;
      level = combined >= 1 ? "achieved" : combined > 0 ? "partialAchieved" : "notAchieved";
    }

    // A型も一時費用チェック
    if (goal.type === "A" && goal.requiredOptionalCost) {
      const paid = player.paidOptionalCosts.includes(goal.requiredOptionalCost);
      if (!paid && level === "achieved") level = "partialAchieved";
    }

    return { goalId: pg.goalId, title: goal.title, type: goal.type, level,
             scoreWeight: goalsData.achievementLevels[level].scoreWeight,
             spendScore, insLevel };
  });
}

const OPT_COST_BONUS = { marriage: 10, childbirth: 5, retirement: 5, inheritance: 8 };

function calculateFinalScore(player, goalsData) {
  const goalResults = evaluateGoals(player, goalsData);
  const total = goalResults.length;
  const achieved = goalResults.filter(r => r.level === "achieved").length;
  const partial  = goalResults.filter(r => r.level === "partialAchieved").length;
  const weightedSum = goalResults.reduce((s, r) => s + r.scoreWeight, 0);
  const achievementRate = total > 0 ? (weightedSum / total) * 100 : 0;
  const bonusScore = achieved * 10;
  // 一時費用ボーナス点
  const optCostBonusDetails = (player.paidOptionalCosts || []).map(stopId => ({
    stopId, points: OPT_COST_BONUS[stopId] || 0
  })).filter(d => d.points > 0);
  const optCostBonusScore = optCostBonusDetails.reduce((s, d) => s + d.points, 0);
  // 赤字ペナルティ: 50万円ごとに5点減点
  const bankruptPenalty = player.assets < 0
    ? Math.floor(Math.abs(player.assets) / 50) * 5 : 0;
  return { goalResults, achievedCount:achieved, partialCount:partial, totalCount:total,
           achievementRate: Math.round(achievementRate*10)/10, bonusScore,
           optCostBonusScore, optCostBonusDetails,
           bankruptPenalty,
           totalScore: Math.max(0, Math.round(achievementRate + bonusScore + optCostBonusScore - bankruptPenalty)),
           finalAssets: player.assets };
}

function getMonthlyPremiumTotal(player) { return player.insurances.reduce((s,i) => s + i.monthlyPremium, 0); }

function previewPremium(insId, stopId, insuranceData) {
  const ins = insuranceData.insuranceTypes.find(i => i.id === insId);
  const mult = insuranceData.timingMultipliers.find(t => t.stopId === stopId);
  return ins && mult ? Math.round(ins.baseMonthlyPremium * mult.multiplier) : 0;
}

function canEnroll(insId, stopId, insuranceData) {
  const ins = insuranceData.insuranceTypes.find(i => i.id === insId);
  if (!ins) return false;
  const curMult = insuranceData.timingMultipliers.find(t => t.stopId === stopId).multiplier;
  if (ins.minEnrollmentStop) {
    const minMult = insuranceData.timingMultipliers.find(t => t.stopId === ins.minEnrollmentStop).multiplier;
    if (curMult < minMult) return false;
  }
  if (ins.maxEnrollmentStop) {
    const maxMult = insuranceData.timingMultipliers.find(t => t.stopId === ins.maxEnrollmentStop).multiplier;
    if (curMult > maxMult) return false;
  }
  return true;
}
</script>

  const lifestylePanel = `

          <div style="font-size:18px; font-weight:bold; color:#fff; margin-bottom:4px">
            ${lifestyle.name}
            <span style="font-size:13px; color:#f39c12; margin-left:8px">難易度 ${"★".repeat(lifestyle.difficulty)}${"☆".repeat(5-lifestyle.difficulty)}</span>
          </div>
          <div style="color:#99a; font-size:13px; margin-bottom:6px">${lifestyle.description}</div>
          <div style="font-size:12px; color:#778;">初期資産: <strong style="color:#27ae60">${lifestyle.initialAssets}万円</strong></div>
        </div>
        <div style="min-width:180px">
          <div style="font-size:12px; color:#99a; margin-bottom:4px">このライフスタイルで重要な保険</div>
          <div style="display:flex; flex-wrap:wrap; gap:4px">${keyInsHtml}</div>
        </div>
      </div>
    </div>`;

  // カテゴリ別にグループ化して表示
  const categoryOrder = ["family","health","career","retirement"];
  const grouped = categoryOrder.map(cat => {
    const goalsInCat = GOALS_DATA.goalCards.filter(g => g.category === cat);
    if (goalsInCat.length === 0) return "";
    const cardHtml = goalsInCat.map(goal => {
      const isSel = !!sel[goal.id];
      const ms = sel[goal.id]?.monthlySpend ?? goal.defaultMonthlySpend;
      return `
        <div class="goal-card ${isSel ? 'selected' : ''}" onclick="toggleGoal('${goal.id}')">
          <span class="goal-type goal-type-${goal.type}">${goal.type}タイプ</span>
          <div class="goal-title-text">${goal.title}</div>
          ${goal.hasRecurringCost ? `<div class="goal-cost">月額支出: ${ms.toLocaleString()}円/月</div>` : `<div class="goal-cost">支出なし</div>`}
          <div class="goal-note">${goal.achievementNote}</div>
        </div>`;
    }).join("");
    return `
      <div style="margin-bottom:16px">
        <h3 style="color:#7ec8e3; margin-bottom:8px; border-bottom:1px solid #2a2a50; padding-bottom:4px">
          ${CATEGORY_NAMES[cat] || cat}
        </h3>
        <div class="goal-grid">${cardHtml}</div>
      </div>`;
  }).join("");

  // 全員の選択状況サマリー（2人以上のとき）
  let summaryHtml = "";
  if (S.gs.players.length > 1) {
    const statusItems = S.gs.players.map(p => {
      const done = playerReady(p);
      const n = Object.keys(S.pendGoals[p.id]).length;
      const color = done ? "#5dde9a" : "#778";
      const icon = done ? "✓" : "…";
      return `<span style="color:${color}; font-size:12px; margin-right:12px">${icon} ${p.id}（${n}枚）</span>`;
    }).join("");
    const readyCount = S.gs.players.filter(playerReady).length;
    summaryHtml = `
      <div style="background:#0d1020; border:1px solid #2a2a50; border-radius:6px; padding:8px 12px; margin-bottom:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span style="font-size:12px; color:#99a; margin-right:4px">選択状況:</span>
        ${statusItems}
        <span style="font-size:12px; color:#99a; margin-left:auto">${readyCount} / ${S.gs.players.length} 人完了</span>
      </div>`;
  }

  app.innerHTML = `
    <h1>目的カード選択</h1>
    ${tabsHtml}
    ${lifestylePanel}
    <div class="panel">
      <div class="panel-title">${player.id} さんの人生の目的を選んでください（最低2枚）</div>
      <div class="flex-row">
        <span>選択中: <strong>${count}枚</strong></span>
        ${totalMonthly > 0 ? `<span>目的支出合計: <strong style="color:#f39c12">${totalMonthly.toLocaleString()}円/月</strong></span>` : ""}
        <span class="tip">• Aタイプ: 支出継続が条件　• Bタイプ: 保険加入が条件　• Cタイプ: 両方</span>
      </div>
    </div>
    <div>${grouped}</div>
    ${summaryHtml}
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px">
      <button class="btn-back" onclick="goBackFromGoals()">← 戻る</button>
      <div style="display:flex; gap:8px; align-items:center">
        ${!allReady ? `<span style="font-size:12px; color:#778">全員が2枚以上選ぶと進めます</span>` : ""}
        <button class="btn-confirm" ${allReady ? "" : "disabled"} onclick="proceedToInsurance()">
          保険選択へ →
        </button>
      </div>
    </div>`;
}

function switchGoalPlayer(idx) {
  S.pIdx = idx;
  render();
}

function goBackFromGoals() {
  S.gs = null;
  S.pendGoals = {};
  S.pendIns = {};
  S.pendOptCost = {};
  S.phase = "setup";
  render();
}

function toggleGoal(gid) {
  const sel = S.pendGoals[S.gs.players[S.pIdx].id];
  const goal = GOALS_DATA.goalCards.find(g => g.id === gid);
  if (sel[gid]) { delete sel[gid]; }
  else { sel[gid] = { goalId: gid, monthlySpend: goal.defaultMonthlySpend }; }
  render();
}

function proceedToInsurance() {
  // 全プレイヤーの選択を一括で確定してから保険画面へ
  S.gs.players.forEach(p => {
    const selections = Object.values(S.pendGoals[p.id]);
    setPlayerGoals(p, selections, GOALS_DATA);
  });
  S.phase = "insurance";
  S.pIdx = 0;
  render();
}

// ─────────────────────────────────────────────────────────────
// SCREEN 3: Insurance Review (per player, at each mandatory stop)
// ─────────────────────────────────────────────────────────────
function renderInsurance() {
  const player = S.gs.players[S.pIdx];
  const stage = stageInfo(S.gs.currentStageIndex);
  const stopId = stage.mandatoryStopBefore.stopId;
  const stopName = stage.mandatoryStopBefore.stopName;
  const optCost = stage.mandatoryStopBefore.optionalCost;
  const multEntry = INSURANCE_DATA.timingMultipliers.find(t => t.stopId === stopId);
  const pend = S.pendIns[player.id];
  const enrolled = new Set(player.insurances.map(i => i.insuranceId));
  // Effective enrolled = (enrolled - remove) + add
  const effEnrolled = new Set([...enrolled].filter(id => !pend.remove.has(id)));
  pend.add.forEach(id => effEnrolled.add(id));

  let totalMonthly = player.insurances
    .filter(i => !pend.remove.has(i.insuranceId))
    .reduce((s,i) => s + i.monthlyPremium, 0);
  pend.add.forEach(id => {
    if (!enrolled.has(id)) totalMonthly += previewPremium(id, stopId, INSURANCE_DATA);
  });

  // Optional cost panel (only show on first player's view to avoid repetition)
  const optCostBonus = optCost ? (OPT_COST_BONUS[stopId] || 0) : 0;
  const optCostHtml = (optCost && S.pIdx === 0) ? `
    <div class="panel" style="border-color:#f39c12">
      <div class="panel-title" style="color:#f39c12">ライフイベント一時費用（選択式）</div>
      <div class="info-row">
        <div class="info-item">イベント: <span>${stopName}</span></div>
        <div class="info-item">費用: <span style="color:#f39c12">${optCost.amount}万円</span></div>
        <div class="info-item" style="color:#99a">${optCost.label}</div>
        ${optCostBonus > 0 ? `<div class="info-item">支払うと: <span style="color:#27ae60; font-weight:bold">最終スコア ＋${optCostBonus}点</span></div>` : ""}
      </div>
      <div style="margin-top:10px">各プレイヤーが個別に支払うかどうか選択してください。</div>
    </div>` : "";

  // Optional cost per player
  const pendOptKey = player.id + "_optCost";
  if (!(pendOptKey in S.pendOptCost)) S.pendOptCost[pendOptKey] = false;

  const rows = INSURANCE_DATA.insuranceTypes.map(ins => {
    const isEnrolled = enrolled.has(ins.id);
    const isAdding = pend.add.has(ins.id);
    const isRemoving = pend.remove.has(ins.id);
    const isEffective = effEnrolled.has(ins.id);
    const ok = canEnroll(ins.id, stopId, INSURANCE_DATA);
    const premium = isEnrolled
      ? player.insurances.find(i => i.insuranceId === ins.id).monthlyPremium
      : previewPremium(ins.id, stopId, INSURANCE_DATA);
    const mult = multEntry.multiplier;

    let actionBtn = "";
    if (isEnrolled && !isRemoving) {
      actionBtn = `<button class="btn-warn btn-sm" onclick="pendRemove('${ins.id}')">解約</button>`;
    } else if (isEnrolled && isRemoving) {
      actionBtn = `<button class="btn-confirm btn-sm" onclick="undoRemove('${ins.id}')">解約取消</button>`;
    } else if (!isEnrolled && ok && !isAdding) {
      actionBtn = `<button class="btn-action btn-sm" onclick="pendAdd('${ins.id}')">加入</button>`;
    } else if (!isEnrolled && ok && isAdding) {
      actionBtn = `<button class="btn-confirm btn-sm" onclick="undoAdd('${ins.id}')">加入取消</button>`;
    } else if (!ok) {
      // 加入不可の理由を表示
      let reason = "加入不可";
      if (ins.minEnrollmentStop) {
        const minStop = INSURANCE_DATA.timingMultipliers.find(t => t.stopId === ins.minEnrollmentStop);
        const curMult = INSURANCE_DATA.timingMultipliers.find(t => t.stopId === stopId).multiplier;
        if (minStop && curMult < minStop.multiplier) reason = minStop.stopName + "以降加入可";
      }
      actionBtn = `<span class="tip">${reason}</span>`;
    }

    const rowClass = isEffective ? "enrolled" : "";
    const statusBadge = isRemoving ? `<span style="color:#e94560">[解約予定]</span>` :
                        isAdding   ? `<span style="color:#27ae60">[加入予定]</span>` :
                        isEnrolled ? `<span class="badge-achieved">加入中</span>` : "";

    // 特殊効果の追加表示
    let specialNote = "";
    if (ins.specialEffect === "additionalRetirementIncome" && ins.pensionBonusByStop) {
      const bonus = ins.pensionBonusByStop[stopId] ?? ins.additionalMonthlyIncome ?? 0;
      specialNote = `<br><span class="tip" style="color:#7ec8e3">老後受取: +${bonus.toLocaleString()}円/月</span>`;
    }
    if (ins.specialEffect === "deathBenefit" && ins.deathBenefitByStop) {
      const benefit = ins.deathBenefitByStop[stopId] ?? 0;
      specialNote = `<br><span class="tip" style="color:#f39c12">死亡保険金: ${benefit}万円</span>`;
    }

    return `<tr class="${rowClass}">
      <td><strong>${ins.name}</strong><br><span class="tip">${ins.description}</span>${specialNote}</td>
      <td>${fmtYen(premium)} ${mult > 1 ? `<span class="premium-up">（×${mult}）</span>` : ""}</td>
      <td>${ins.reductionRate > 0 ? Math.round(ins.reductionRate*100)+"%" : ins.specialEffect ? "特殊効果" : "−"}</td>
      <td>${ins.coverageCategories.map(c => EVENTS_DATA.eventCategories[c]?.name || c).join("・") || ins.specialEffect ? "特殊" : "−"}</td>
      <td>${statusBadge} ${actionBtn}</td>
    </tr>`;
  }).join("");

  const payingOptCost = S.pendOptCost[pendOptKey];
  // 一時費用が目的カードの達成条件になっているか確認
  const relatedGoals = optCost ? player.goals.filter(pg => {
    const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
    return goal && goal.requiredOptionalCost === stopId;
  }) : [];

  // 【B2-1】ゴール影響警告バナー：支払わないとゴール達成に影響するケースを明示
  let goalImpactBannerHtml = "";
  if (relatedGoals.length > 0 && optCost) {
    const goalItems = relatedGoals.map(pg => {
      const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
      // goal_12（終身保険）は相続費用未払いで「未達成」、それ以外は「一部達成」
      const impact = pg.goalId === 'goal_12' ? '未達成' : '一部達成';
      const impactColor = impact === '未達成' ? '#e94560' : '#f39c12';
      return `<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(243,156,18,0.2);">
        <span style="color:${impactColor};font-size:18px;line-height:1.2;flex-shrink:0">▶</span>
        <div>
          <span style="color:#dde;font-size:14px;font-weight:bold">「${goal.title}」</span>
          <span style="color:${impactColor};font-size:14px;font-weight:bold">が${impact}になります</span>
          ${impact === '未達成' ? '<div style="color:#e94560;font-size:12px;margin-top:2px">⚠ 目的カード達成が完全に失われます</div>' : '<div style="color:#778;font-size:12px;margin-top:2px">スコアが0.5倍になります</div>'}
        </div>
      </div>`;
    }).join('');

    goalImpactBannerHtml = `
      <div style="background:#1e1200;border:2px solid #f39c12;border-radius:8px;padding:12px 14px;margin-bottom:12px;">
        <div style="color:#f39c12;font-size:15px;font-weight:bold;margin-bottom:8px;">
          ⚠️ このイベント費用を支払わないと…
        </div>
        ${goalItems}
      </div>`;
  }

  const optCostPlayerHtml = optCost ? `
    <div class="panel" style="border-color:#f39c12;margin-bottom:10px;">
      <div class="panel-title" style="color:#f39c12">ライフイベント費用の選択 — ${player.id}</div>
      ${goalImpactBannerHtml}
      <div style="margin-bottom:12px;">
        <div style="font-size:14px;font-weight:bold;color:#dde;margin-bottom:4px;">${optCost.label}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
          <span style="font-size:13px;color:#99a;">費用: <strong style="color:#f39c12;font-size:16px;">${optCost.amount}万円</strong></span>
          <span style="font-size:13px;color:#99a;">現在資産: ${fmtAsset(player.assets)}</span>
          ${optCostBonus > 0 ? `<span style="font-size:13px;color:#27ae60;">✅ 支払うと最終スコア＋${optCostBonus}点</span>` : ""}
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button onclick="if(!${payingOptCost})toggleOptCost('${pendOptKey}')"
          style="flex:1;min-width:130px;padding:10px 16px;font-size:15px;font-weight:bold;border-radius:6px;cursor:pointer;border:2px solid;
                 background:${payingOptCost ? '#1a5c38' : '#0d1a10'};
                 color:${payingOptCost ? '#5dde9a' : '#3a6a48'};
                 border-color:${payingOptCost ? '#27ae60' : '#2a4a32'};">
          ${payingOptCost ? '✓ 支払う（選択中）' : '支払う（' + optCost.amount + '万円）'}
        </button>
        <button onclick="if(${payingOptCost})toggleOptCost('${pendOptKey}')"
          style="flex:1;min-width:100px;padding:10px 16px;font-size:15px;font-weight:bold;border-radius:6px;cursor:pointer;border:2px solid;
                 background:${!payingOptCost ? '#1a1a38' : '#0d0d20'};
                 color:${!payingOptCost ? '#dde' : '#445'};
                 border-color:${!payingOptCost ? '#3a3a70' : '#1a1a38'};">
          ${!payingOptCost ? '✓ スキップ（選択中）' : 'スキップに変更'}
        </button>
      </div>
    </div>` : "";

  // 目的支出調整パネル
  const recurringGoals = player.goals.filter(pg => {
    const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
    return goal && goal.hasRecurringCost;
  });
  let goalSpendHtml = "";
  if (recurringGoals.length > 0) {
    const spendAdj = S.pendGoalSpend[player.id] || {};
    const goalRows = recurringGoals.map(pg => {
      const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
      const cur = spendAdj[pg.goalId] ?? pg.monthlySpend;
      const def = goal.defaultMonthlySpend;
      const min = Math.round(def * 0.5 / 5000) * 5000;
      const max = Math.round(def * 2.0 / 5000) * 5000;
      const pct = Math.round(cur / def * 100);
      const isActive = goal.activeStages.includes(stage.id);
      const annualCost = (cur * 12 / 10000).toFixed(1);
      const turnCost = (cur * 12 / 10000 * stage.yearsPerTurn).toFixed(1);
      const reducedWarning = cur < def
        ? `<span style="color:#e67e22; font-size:11px"> ⚠ 減額中（一部達成リスク）</span>` : "";
      return `
        <tr>
          <td>
            <span class="goal-type goal-type-${goal.type}">${goal.type}</span>
            ${goal.title}
            ${isActive ? '<span style="color:#27ae60; font-size:11px"> ●このステージで支出</span>' : '<span style="color:#778; font-size:11px"> ○次ステージ以降</span>'}
            ${reducedWarning}
          </td>
          <td style="text-align:center">
            <button class="btn-sm btn-back" onclick="adjustGoalSpend('${player.id}','${pg.goalId}',-5000)" ${cur <= min ? 'disabled' : ''}>－</button>
            <strong style="margin: 0 8px; color:${pct < 100 ? '#e67e22' : pct > 100 ? '#7ec8e3' : '#dde'}">${fmtYen(cur)}/月</strong>
            <button class="btn-sm btn-back" onclick="adjustGoalSpend('${player.id}','${pg.goalId}',5000)" ${cur >= max ? 'disabled' : ''}>＋</button>
            <span style="color:#778; font-size:11px; margin-left:6px">(${pct}%)</span>
          </td>
          <td style="color:#f39c12; text-align:right">${annualCost}万/年</td>
          <td style="color:#e94560; text-align:right">${turnCost}万/ターン</td>
        </tr>`;
    }).join("");
    goalSpendHtml = `
      <div class="panel" style="margin-top:12px">
        <div class="panel-title">目的カードの支出見直し（任意）</div>
        <div class="tip" style="margin-bottom:8px">デフォルト額の50%〜200%の範囲で調整できます。減額は一部達成リスクがあります。</div>
        <table class="ins-table">
          <thead><tr><th>目的カード</th><th style="text-align:center">月額支出</th><th>年額</th><th>今ターン</th></tr></thead>
          <tbody>${goalRows}</tbody>
        </table>
      </div>`;
  }

  app.innerHTML = `
    <h1>強制ストップ — ${stopName}</h1>
    ${optCostHtml}
    ${optCostPlayerHtml}
    <div class="panel">
      <div class="panel-title">${player.id} さんの保険見直し（${S.pIdx+1}人目 / ${S.gs.players.length}人中）</div>
      <div class="info-row">
        <div class="info-item">ステージ: <span>${stage.name}（${stage.ageRange}）</span></div>
        <div class="info-item">経過年数/ターン: <span>${stage.yearsPerTurn}年</span></div>
        <div class="info-item">加入乗数: <span>×${multEntry.multiplier}（${multEntry.ageGuide}時点）</span></div>
        <div class="info-item">月額保険料合計（予定）: <span style="color:#f39c12">${fmtYen(totalMonthly)}/月</span></div>
        <div class="info-item">年額: <span style="color:#e94560">${((totalMonthly*12)/10000).toFixed(1)}万円/年</span></div>
      </div>
    </div>
    <div class="panel" style="overflow-x:auto">
      <table class="ins-table">
        <thead><tr><th>保険名・説明</th><th>月額保険料</th><th>損失軽減率</th><th>対象イベント</th><th>操作</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${goalSpendHtml}
    <div style="text-align:right">
      <button class="btn-confirm" onclick="confirmInsurance()">
        ${S.pIdx < S.gs.players.length - 1 ? "次のプレイヤーへ →" : "ターン開始 →"}
      </button>
    </div>`;
}

function pendAdd(id)    { S.pendIns[S.gs.players[S.pIdx].id].add.add(id);    render(); }
function undoAdd(id)    { S.pendIns[S.gs.players[S.pIdx].id].add.delete(id); render(); }
function pendRemove(id) { S.pendIns[S.gs.players[S.pIdx].id].remove.add(id); render(); }
function undoRemove(id) { S.pendIns[S.gs.players[S.pIdx].id].remove.delete(id); render(); }
function toggleOptCost(key) { S.pendOptCost[key] = !S.pendOptCost[key]; render(); }

function adjustGoalSpend(playerId, goalId, delta) {
  const player = S.gs.players.find(p => p.id === playerId);
  const pg = player.goals.find(g => g.goalId === goalId);
  if (!pg) return;
  const goal = GOALS_DATA.goalCards.find(g => g.id === goalId);
  const min = Math.round(goal.defaultMonthlySpend * 0.5 / 5000) * 5000;
  const max = Math.round(goal.defaultMonthlySpend * 2.0 / 5000) * 5000;
  const cur = S.pendGoalSpend[playerId][goalId] ?? pg.monthlySpend;
  const next = Math.min(max, Math.max(min, cur + delta));
  S.pendGoalSpend[playerId][goalId] = next;
  render();
}

function confirmInsurance() {
  const player = S.gs.players[S.pIdx];
  const stage = stageInfo(S.gs.currentStageIndex);
  const pend = S.pendIns[player.id];
  const stopId = stage.mandatoryStopBefore.stopId;

  // 一時費用の支払い
  const optCost = stage.mandatoryStopBefore.optionalCost;
  if (optCost && S.pendOptCost[player.id + "_optCost"]) {
    payOptionalCost(player, optCost.amount);
    player.paidOptionalCosts.push(stopId);
  }

  // 保険の変更を適用
  reviewInsurance(player, [...pend.add], [...pend.remove], stopId, INSURANCE_DATA);

  // 目的支出の調整を適用
  const spendAdj = S.pendGoalSpend[player.id] || {};
  Object.entries(spendAdj).forEach(([goalId, newSpend]) => {
    const pg = player.goals.find(g => g.goalId === goalId);
    if (pg) pg.monthlySpend = newSpend;
  });

  // pendingリセット
  S.pendIns[player.id] = { add: new Set(), remove: new Set() };
  S.pendOptCost[player.id + "_optCost"] = false;
  S.pendGoalSpend[player.id] = {};

  S.pIdx++;
  if (S.pIdx >= S.gs.players.length) {
    completeMandatoryStop(S.gs);
    S.phase = "turn";
    S.pIdx = 0;
    S.lastResult = null;
    S.rolled = false;
  }
  render();
}

// ─────────────────────────────────────────────────────────────
// SCREEN 4: Turn
// ─────────────────────────────────────────────────────────────
function renderTurn() {
  const stage = stageInfo(S.gs.currentStageIndex);
  const totalTurns = STAGES_DATA.stages.reduce((s,st) => s + st.turns, 0);

  // Stage progress bar
  let pips = "";
  let turnsSoFar = 0;
  STAGES_DATA.stages.forEach((st, si) => {
    for (let t = 0; t < st.turns; t++) {
      const globalTurnNum = turnsSoFar + t;
      const cls = globalTurnNum < S.gs.globalTurn ? "done" : globalTurnNum === S.gs.globalTurn ? "current" : "";
      pips += `<div class="stage-pip ${cls}" title="${st.name} T${t+1}"></div>`;
    }
    turnsSoFar += st.turns;
  });

  const infoBar = `
    <div class="info-row">
      <div class="info-item">ステージ: <span>${stage.name}（${stage.ageRange}）</span></div>
      <div class="info-item">ステージ内ターン: <span>${S.gs.currentTurnInStage + (S.rolled?0:0)+1} / ${stage.turns}</span></div>
      <div class="info-item">通算ターン: <span>${S.gs.globalTurn + 1} / ${totalTurns}</span></div>
    </div>`;

  const years = stage.yearsPerTurn || 1;
  const annualIncome = (stage.monthlyIncome * 12) / 10000;
  const annualBasic  = stage.annualBasicExpense || 0;

  // Player asset summary
  const assetTable = `
    <div class="tip" style="margin-bottom:6px">このターンの経過年数: <strong style="color:#7ec8e3">${years}年分</strong>　年収: ${annualIncome.toFixed(0)}万円/年　基礎生活費: ${annualBasic}万円/年　差引: ${(annualIncome - annualBasic).toFixed(0)}万円/年</div>
    <table class="results-table" style="margin-bottom:10px">
      <thead><tr>
        <th>プレイヤー</th><th>現在資産</th><th>月額保険料</th><th>保険料/ターン</th><th>目的支出/ターン</th>
      </tr></thead>
      <tbody>${S.gs.players.map(p => {
        const ms = getMonthlyPremiumTotal(p);
        const ap = calculateAnnualPremium(p);
        const gs = calculateAnnualGoalSpend(p, stage.id, GOALS_DATA);
        return `<tr>
          <td>
            <button class="player-name-btn" onclick="showPlayerDetail('${p.id}')">${p.id}</button>
            <span class="player-name-hint">ℹ️</span>
          </td>
          <td>${fmtAsset(p.assets)}</td>
          <td>${fmtYen(ms)}/月</td>
          <td>${(ap * years).toFixed(1)}万円</td>
          <td>${gs > 0 ? (gs * years).toFixed(1)+"万円" : "−"}</td>
        </tr>`;
      }).join("")}</tbody>
    </table>`;

  let eventSection = "";
  let actionBtn = "";

  if (!S.rolled) {
    eventSection = `<div class="panel"><div class="panel-title">イベントが発生します</div>
      <p class="tip">「サイコロを振る」ボタンで今ターンのイベントを決定します。全員に同じイベントが発生します。</p></div>`;
    actionBtn = `<button class="btn-primary" onclick="doRoll()">🎲 サイコロを振る</button>`;
  } else {
    const r = S.lastResult;
    const ev = r.eventCard;
    const catInfo = EVENTS_DATA.eventCategories[ev.category];
    const severityLabel = { light:"軽度", medium:"中度", heavy:"重度" }[ev.severity] || ev.severity;
    // 処理時のステージIDを使用（ターン処理後にステージが進んでいる場合があるため）
    const processedStageId = r.playerResults[0]?.stageId;
    const effectiveAmt = (ev.stageAmounts && processedStageId && ev.stageAmounts[processedStageId] !== undefined)
      ? ev.stageAmounts[processedStageId] : ev.amount;
    const isLucky = effectiveAmt > 0;

    eventSection = `
      <div class="event-banner cat-${ev.category}">
        <div class="ev-cat">${catInfo.name} / ${severityLabel}</div>
        <div class="ev-title">${ev.title}</div>
        <div class="ev-desc">${ev.description}</div>
        <div class="ev-amount" style="color:${isLucky?'#f39c12':'#e94560'}">
          ${isLucky ? "+" : ""}${effectiveAmt}万円 ${ev.isCancerEvent ? "（がんイベント）" : ""}
          ${ev.insuranceBenefit ? `<span style="font-size:0.75em;color:#f39c12;display:block">※ 該当保険加入者のみ給付</span>` : ""}
        </div>
      </div>

      <div class="tip" style="margin-bottom:6px">※ 収入・基礎生活費・保険料・目的支出はすべて年額×${r.playerResults[0]?.years||1}年分。イベント損失は一時額。単位：万円</div>
      <table class="results-table">
        <thead><tr>
          <th>プレイヤー</th>
          <th>収入</th>
          <th>基礎生活費</th>
          <th>保険料</th>
          <th>目的支出</th>
          <th>損害額</th>
          <th>保険金給付</th>
          <th>ラッキー給付</th>
          <th>純変動</th>
          <th>資産（後）</th>
        </tr></thead>
        <tbody>${r.playerResults.map(pr => {
          const insHelped = pr.insurancePayout > 0;
          const hasDamage = pr.eventBaseDamage > 0;
          const isInsBenefitEvent = !!(r.eventCard.insuranceBenefit);
          return `<tr>
            <td>${pr.playerId}</td>
            <td class="pos">+${pr.income.toFixed(1)}</td>
            <td class="neg">-${pr.basicExpense.toFixed(1)}</td>
            <td class="neg">${pr.premium > 0 ? "-"+pr.premium.toFixed(1) : "−"}</td>
            <td class="neg">${pr.goalSpend > 0 ? "-"+pr.goalSpend.toFixed(1) : "−"}</td>
            <td class="${hasDamage ? 'neg' : 'neutral'}">
              ${hasDamage ? "-"+pr.eventBaseDamage.toFixed(1) : "−"}
            </td>
            <td>
              ${hasDamage
                ? insHelped
                  ? `<span class="pos" style="font-weight:bold">+${pr.insurancePayout.toFixed(1)}万円</span>
                     <div class="tip">${pr.appliedIns.join("・")}</div>
                     <div style="color:#e94560;font-size:0.85em">実質負担: -${pr.eventDamage.toFixed(1)}万円</div>`
                  : `<span class="badge-fail">保険なし</span>
                     <div style="color:#e94560;font-size:0.85em">実質負担: -${pr.eventDamage.toFixed(1)}万円</div>`
                : "−"}
            </td>
            <td class="${pr.eventGain > 0 ? 'pos' : 'neutral'}">
              ${pr.eventGain > 0
                ? `<span style="font-weight:bold">+${pr.eventGain.toFixed(1)}万円</span>`
                  + (isInsBenefitEvent && pr.eventGain === 0 ? "" : "")
                : isInsBenefitEvent
                  ? `<span class="tip">保険なし<br>給付なし</span>`
                  : "−"}
            </td>
            <td class="${pr.netChange >= 0 ? 'pos' : 'neg'}">${fmt(pr.netChange)}</td>
            <td>${fmtAsset(pr.assetsAfter)}</td>
          </tr>`;
        }).join("")}</tbody>
      </table>
      ${buildBreakdownAccordion(r)}`;

    const nextLabel = S.gs.phase === "gameOver" ? "結果を見る →"
                    : S.gs.phase === "mandatoryStop" ? `強制ストップ（${stageInfo(S.gs.currentStageIndex).mandatoryStopBefore.stopName}）へ →`
                    : "次のターンへ →";
    actionBtn = `<button class="btn-confirm" onclick="advanceTurn()">${nextLabel}</button>`;
  }

  app.innerHTML = `
    <h1>ターン ${S.gs.globalTurn + 1}</h1>
    <div class="stage-bar">${pips}</div>
    ${infoBar}
    <div class="panel">
      <div class="tip" style="margin-bottom:6px; color:#556;">💡 プレイヤー名をタップするとライフスタイル・目的カード・保険の詳細を確認できます</div>
      ${assetTable}
    </div>
    ${eventSection}
    <div style="text-align:right; margin-top:12px">${actionBtn}</div>
    ${S.detailPlayer ? renderPlayerDetailModal(S.detailPlayer) : ''}`;
}

function doRoll() {
  S.lastResult = processTurn(S.gs, STAGES_DATA, EVENTS_DATA, GOALS_DATA, INSURANCE_DATA);
  S.rolled = true;
  S.expandedBreakdown.clear();
  const hasDamage = S.lastResult.playerResults.some(pr => pr.eventBaseDamage > 0);
  if (hasDamage) {
    showBeforeAfterAnimation(S.lastResult).then(() => render());
  } else {
    render();
  }
}

// ─────────────────────────────────────────────────────────────
// BEFORE-AFTER ANIMATION (実装1: 保険あり/なし演出)
// ─────────────────────────────────────────────────────────────
function showBeforeAfterAnimation(result) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = [
      'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:2000;',
      'display:flex;align-items:center;justify-content:center;padding:16px;',
      'animation:baFadeIn 0.25s ease;'
    ].join('');

    const box = document.createElement('div');
    box.style.cssText = [
      'background:#1a1a38;border:2px solid #3a3a70;border-radius:12px;',
      'padding:20px;max-width:460px;width:100%;max-height:85dvh;overflow-y:auto;'
    ].join('');

    const ev = result.eventCard;
    const catInfo = EVENTS_DATA.eventCategories[ev.category];

    const headerDiv = document.createElement('div');
    headerDiv.innerHTML = `
      <div style="color:#7ec8e3;font-size:11px;letter-spacing:1px;margin-bottom:4px;font-weight:bold">${catInfo.name}</div>
      <div style="font-size:17px;font-weight:bold;color:#dde;margin-bottom:14px">${ev.title}</div>`;
    box.appendChild(headerDiv);

    const hintDiv = document.createElement('div');
    hintDiv.style.cssText = 'color:#445;font-size:12px;text-align:center;margin-top:12px;display:none';
    hintDiv.textContent = 'タップして閉じる';

    const playerDivs = [];
    result.playerResults.forEach(pr => {
      if (pr.eventBaseDamage <= 0) return;
      const d = document.createElement('div');
      d.style.cssText = 'background:#0d0d1a;border:1px solid #2a2a50;border-radius:8px;padding:12px 14px;margin-bottom:8px;';
      d.innerHTML = `
        <div style="font-weight:bold;color:#99b;font-size:12px;margin-bottom:6px">${pr.playerId}</div>
        <div data-step="1" style="color:#e94560;font-size:17px;font-weight:bold">
          保険なし：-${pr.eventBaseDamage.toFixed(1)}万円
        </div>
        <div data-step="2" style="display:none;margin-top:6px;font-size:14px;font-weight:bold;color:${pr.insurancePayout > 0 ? '#27ae60' : '#888'}">
          ${pr.insurancePayout > 0
            ? `💊 ${pr.appliedIns.join('・')}で補填：+${pr.insurancePayout.toFixed(1)}万円`
            : '補填なし：全額負担'}
        </div>
        <div data-step="3" style="display:none;margin-top:8px;padding-top:8px;border-top:1px dashed #2a2a50;font-size:16px;font-weight:bold">
          実損：<span style="color:#e94560">-${pr.eventDamage.toFixed(1)}万円</span>${pr.insurancePayout > 0 ? ' ✅' : ''}
        </div>`;
      box.appendChild(d);
      playerDivs.push(d);
    });

    box.appendChild(hintDiv);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    const closeOverlay = () => {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      resolve();
    };
    overlay.addEventListener('click', closeOverlay);

    // Animation: step1(即座) → step2(+0.8s) → step3(+1.6s) → 閉じる(+3.1s)
    setTimeout(() => {
      playerDivs.forEach(d => { d.querySelector('[data-step="2"]').style.display = 'block'; });
      setTimeout(() => {
        playerDivs.forEach(d => { d.querySelector('[data-step="3"]').style.display = 'block'; });
        hintDiv.style.display = 'block';
        setTimeout(closeOverlay, 1500);
      }, 800);
    }, 800);
  });
}

function advanceTurn() {
  S.rolled = false;
  S.lastResult = null;
  S.detailPlayer = null;
  S.expandedBreakdown.clear();
  if (S.gs.phase === "gameOver") {
    S.phase = "results";
  } else if (S.gs.phase === "mandatoryStop") {
    S.phase = "insurance";
    S.pIdx = 0;
  }
  // else: stay in "turn" phase
  render();
}

// ─────────────────────────────────────────────────────────────
// PLAYER DETAIL MODAL
// ─────────────────────────────────────────────────────────────
function showPlayerDetail(pid) { S.detailPlayer = pid; render(); }
function hidePlayerDetail()     { S.detailPlayer = null; render(); }
function toggleBreakdown(pid)   {
  if (S.expandedBreakdown.has(pid)) S.expandedBreakdown.delete(pid);
  else S.expandedBreakdown.add(pid);
  render();
}

const _INS_NAMES = { medical:"医療保険", cancer:"がん保険", disability:"就業不能保険",
  accident:"傷害保険", wholeLife:"終身保険", nursing:"介護保険（民間）",
  personalPension:"個人年金保険", variableAnnuity:"変額・外貨建て保険" };

function renderPlayerDetailModal(pid) {
  const player = S.gs.players.find(p => p.id === pid);
  if (!player) return "";
  const lifestyle = S.gs.lifestyle;

  // ── Lifestyle section ──
  const keyInsHtml = lifestyle.keyInsurance.map(id =>
    `<span class="tag tag-ins">${_INS_NAMES[id] || id}</span>`).join(" ");
  const lifestyleHtml = `
    <div style="background:#0d1a2a; border:1px solid #2a4a6a; border-radius:6px; padding:12px; margin-bottom:14px;">
      <div class="modal-section-title">ライフスタイル</div>
      <div style="font-size:16px; font-weight:bold; margin-bottom:4px;">${lifestyle.name}
        <span style="font-size:12px; color:#f39c12; margin-left:6px">難易度 ${"★".repeat(lifestyle.difficulty)}${"☆".repeat(5-lifestyle.difficulty)}</span>
      </div>
      <div style="color:#99a; font-size:12px; margin-bottom:8px;">${lifestyle.description}</div>
      <div style="font-size:12px; color:#778;">初期資産: <strong style="color:#27ae60">${lifestyle.initialAssets}万円</strong></div>
      <div style="margin-top:8px;"><span style="font-size:11px; color:#778;">重要な保険: </span>${keyInsHtml}</div>
    </div>`;

  // ── Goals section ──
  const goalHtml = player.goals.map(pg => {
    const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
    if (!goal) return "";
    const reqIns = goal.requiredInsurance.map(id => _INS_NAMES[id] || id);
    const insEnrolled = goal.requiredInsurance.length === 0 ||
      goal.requiredInsurance.some(rid => player.insurances.some(pi => pi.insuranceId === rid));
    const insBadge = goal.requiredInsurance.length > 0
      ? (insEnrolled
          ? `<span style="color:#27ae60; font-size:11px">✓ 保険加入済</span>`
          : `<span style="color:#e94560; font-size:11px">⚠ 未加入</span>`)
      : "";
    const missedBadge = player.goalMissedEvents && player.goalMissedEvents.includes(pg.goalId)
      ? `<span style="color:#e94560; font-size:11px"> ⚠ イベント被弾</span>` : "";
    return `
      <div style="border:1px solid #2a2a50; border-radius:5px; padding:8px; margin-bottom:6px; background:#0e0e22;">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap;">
          <span class="goal-type goal-type-${goal.type}">${goal.type}タイプ</span>
          <span style="font-size:13px; font-weight:bold;">${goal.title}</span>
        </div>
        <div style="font-size:11px; color:#778; margin-bottom:4px;">${goal.achievementNote}</div>
        ${goal.hasRecurringCost ? `<div style="font-size:11px; color:#f39c12;">月額支出: ${pg.monthlySpend.toLocaleString()}円/月</div>` : ""}
        ${goal.requiredInsurance.length > 0 ? `<div style="font-size:11px; color:#7ec8e3; margin-top:3px;">必要な保険: ${reqIns.join("・")} ${insBadge}${missedBadge}</div>` : ""}
      </div>`;
  }).join("");

  // ── Insurance section ──
  const totalMonthly = player.insurances.reduce((s, i) => s + i.monthlyPremium, 0);
  const insListHtml = player.insurances.length > 0
    ? player.insurances.map(pi => {
        const ins = INSURANCE_DATA.insuranceTypes.find(i => i.id === pi.insuranceId);
        const annualM = ((pi.monthlyPremium * 12) / 10000).toFixed(1);
        return `<div class="breakdown-item">
          <span>${ins?.name || pi.insuranceId}</span>
          <span style="color:#f39c12">${fmtYen(pi.monthlyPremium)}/月 <span style="color:#778">(年${annualM}万円)</span></span>
        </div>`;
      }).join("") +
      `<div class="breakdown-item" style="border-top:1px solid #2a2a50; margin-top:4px; padding-top:6px; font-weight:bold;">
        <span>合計</span><span style="color:#e94560">${fmtYen(totalMonthly)}/月</span>
      </div>`
    : `<div style="color:#778; font-size:12px; padding:4px 0;">保険未加入</div>`;

  return `
    <div class="modal-overlay" onclick="hidePlayerDetail()"></div>
    <div class="modal-panel">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid #2a2a50;">
        <h2 style="margin:0; color:#dde; font-size:16px;">${player.id} の詳細情報</h2>
        <button onclick="hidePlayerDetail()" style="background:none; border:none; color:#aab; font-size:24px; cursor:pointer; line-height:1; padding:0 4px;">✕</button>
      </div>

      ${lifestyleHtml}

      <div style="margin-bottom:14px;">
        <div class="modal-section-title">目的カード（${player.goals.length}枚）</div>
        ${goalHtml || '<div style="color:#778; font-size:12px;">なし</div>'}
      </div>

      <div style="margin-bottom:14px;">
        <div class="modal-section-title">加入中の保険</div>
        <div style="background:#0d0d20; border:1px solid #2a2a50; border-radius:6px; padding:10px;">
          ${insListHtml}
        </div>
      </div>

      <div>
        <div class="modal-section-title">現在の資産</div>
        <div style="font-size:22px; font-weight:bold; padding:4px 0;">${fmtAsset(player.assets)}</div>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// EXPENSE BREAKDOWN ACCORDION (post-roll)
// ─────────────────────────────────────────────────────────────
function buildBreakdownAccordion(result) {
  if (!result) return "";
  const rows = result.playerResults.map(pr => {
    const player = S.gs.players.find(p => p.id === pr.playerId);
    if (!player) return "";
    const isOpen = S.expandedBreakdown.has(pr.playerId);
    const years = pr.years;

    // Insurance breakdown rows
    const insRows = player.insurances.length > 0
      ? player.insurances.map(pi => {
          const ins = INSURANCE_DATA.insuranceTypes.find(i => i.id === pi.insuranceId);
          const cost = ((pi.monthlyPremium * 12) / 10000 * years).toFixed(1);
          return `<div class="breakdown-item breakdown-sub">
            <span>${ins?.name || pi.insuranceId} <span style="color:#556">(${fmtYen(pi.monthlyPremium)}/月)</span></span>
            <span style="color:#e94560">-${cost}万円</span>
          </div>`;
        }).join("")
      : `<div class="breakdown-sub" style="color:#778; padding:2px 0;">保険なし</div>`;

    // Goal spending breakdown rows
    const goalRows = player.goals.map(pg => {
      const goal = GOALS_DATA.goalCards.find(g => g.id === pg.goalId);
      if (!goal || !goal.hasRecurringCost || !goal.activeStages.includes(pr.stageId)) return "";
      const cost = ((pg.monthlySpend * 12) / 10000 * years).toFixed(1);
      return `<div class="breakdown-item breakdown-sub">
        <span>${goal.title}</span>
        <span style="color:#e94560">-${cost}万円</span>
      </div>`;
    }).filter(Boolean).join("");

    const bodyHtml = isOpen ? `
      <div class="breakdown-body">
        <div class="breakdown-item">
          <span style="color:#27ae60">📈 収入（${years}年分）</span>
          <span style="color:#27ae60; font-weight:bold">+${pr.income.toFixed(1)}万円</span>
        </div>
        <div class="breakdown-item">
          <span>🏠 基礎生活費（${years}年分）</span>
          <span style="color:#e94560">-${pr.basicExpense.toFixed(1)}万円</span>
        </div>
        ${pr.premium > 0 ? `
        <div class="breakdown-item" style="border-bottom:none;">
          <span>🛡 保険料合計（${years}年分）</span>
          <span style="color:#e94560">-${pr.premium.toFixed(1)}万円</span>
        </div>
        ${insRows}` : ""}
        ${pr.goalSpend > 0 ? `
        <div class="breakdown-item" style="border-bottom:none; margin-top:2px;">
          <span>🎯 目的支出合計（${years}年分）</span>
          <span style="color:#e94560">-${pr.goalSpend.toFixed(1)}万円</span>
        </div>
        ${goalRows}` : ""}
        ${pr.eventDamage > 0 ? `
        <div class="breakdown-item" style="margin-top:2px;">
          <span>⚡ イベント損害（実質負担）</span>
          <span style="color:#e94560">-${pr.eventDamage.toFixed(1)}万円${pr.insurancePayout > 0
            ? ` <span style="color:#27ae60; font-size:10px">(保険給付 +${pr.insurancePayout.toFixed(1)}万)</span>` : ""}</span>
        </div>` : ""}
        ${pr.eventGain > 0 ? `
        <div class="breakdown-item">
          <span>🍀 ラッキー給付</span>
          <span style="color:#f39c12; font-weight:bold">+${pr.eventGain.toFixed(1)}万円</span>
        </div>` : ""}
        <div class="breakdown-item" style="border-top:1px solid #3a3a70; margin-top:4px; padding-top:6px; font-weight:bold; font-size:13px;">
          <span>純変動</span>
          <span class="${pr.netChange >= 0 ? 'pos' : 'neg'}">${fmt(pr.netChange)}</span>
        </div>
      </div>` : "";

    return `
      <div>
        <div class="breakdown-header" onclick="toggleBreakdown('${pr.playerId}')">
          <span><strong>${pr.playerId}</strong> の支出内訳</span>
          <span style="color:#7ec8e3; font-size:12px">${isOpen ? "▲ 閉じる" : "▼ 開く"}</span>
        </div>
        ${bodyHtml}
      </div>`;
  }).join("");

  return `
    <div style="margin-top:14px;">
      <div style="color:#7ec8e3; font-size:12px; font-weight:bold; margin-bottom:4px; letter-spacing:0.5px;">
        💰 支出内訳（名前をクリックで展開）
      </div>
      ${rows}
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// SCREEN 5: Results
// ─────────────────────────────────────────────────────────────
function renderResults() {
  const scores = S.gs.players.map(p => ({ player: p, ...calculateFinalScore(p, GOALS_DATA) }));
  scores.sort((a, b) => b.totalScore - a.totalScore);

  const rankingHtml = scores.map((s, rank) => {
    const wlRecord = s.player.insurances.find(i => i.insuranceId === "wholeLife");
    const deathBenefitNote = wlRecord && wlRecord.deathBenefit > 0
      ? `<div class="score-detail" style="color:#f39c12">終身保険 死亡保険金 +${wlRecord.deathBenefit}万円 を受け取りました</div>`
      : "";
    const optBonusLabel = s.optCostBonusScore > 0
      ? `<span style="color:#27ae60">＋ライフイベント: ${s.optCostBonusScore}点</span>` : "";
    const penaltyLabel = s.bankruptPenalty > 0
      ? `<span style="color:#e94560">－準備不足: ${s.bankruptPenalty}点</span>` : "";
    return `
    <div class="score-row">
      <div class="score-rank">${rank+1}位</div>
      <div class="score-name">${s.player.id}</div>
      <div>
        <div class="score-detail">達成率: ${s.achievementRate}%（${s.achievedCount}/${s.totalCount}枚達成） ＋ボーナス: ${s.bonusScore}点 ${optBonusLabel} ${penaltyLabel}</div>
        <div class="score-detail">最終資産: ${s.finalAssets.toFixed(1)}万円 ${s.finalAssets < 0 ? `<span style='color:#e94560'>（準備不足 ${Math.abs(s.finalAssets).toFixed(1)}万円）</span>` : ""}</div>
        ${deathBenefitNote}
      </div>
      <div class="score-total">${s.totalScore}点</div>
    </div>`;
  }).join("");

  const playerDetails = scores.map(s => {
    const goalRows = s.goalResults.map(gr => {
      const badge = gr.level === "achieved" ? `<span class="badge-achieved">達成</span>`
                  : gr.level === "partialAchieved" ? `<span class="badge-partial">一部達成</span>`
                  : `<span class="badge-fail">未達成</span>`;
      // 一部達成・未達成の理由メモ
      let reasonNote = "";
      if (gr.level !== "achieved") {
        const reasons = [];
        if ((gr.type === "A" || gr.type === "C") && gr.spendScore < 1) {
          reasons.push(gr.spendScore === 0 ? "支出継続できず" : "支出を減額していた");
        }
        if ((gr.type === "B" || gr.type === "C") && gr.insLevel !== "achieved") {
          reasons.push(gr.insLevel === "notAchieved" ? "保険未加入/イベント被弾" : "保険未加入（イベントなし）");
        }
        if (reasons.length > 0) reasonNote = `<div style="font-size:0.78em;color:#888;margin-top:2px">${reasons.join("・")}</div>`;
      }
      return `<tr><td>${gr.title}${reasonNote}</td><td><span class="goal-type goal-type-${gr.type}">${gr.type}</span></td><td>${badge}</td><td>${gr.scoreWeight}</td></tr>`;
    }).join("");
    return `
      <div class="panel">
        <div class="panel-title">${s.player.id} — 目的カード達成状況</div>
        <table class="results-table">
          <thead><tr><th>目的カード</th><th>タイプ</th><th>達成</th><th>得点重み</th></tr></thead>
          <tbody>${goalRows}</tbody>
        </table>
        <div style="margin-top:8px">加入中の保険: ${s.player.insurances.length > 0
          ? s.player.insurances.map(i => {
              const ins = INSURANCE_DATA.insuranceTypes.find(t => t.id === i.insuranceId);
              return `<span class="tag tag-ins">${ins?.name} (${fmtYen(i.monthlyPremium)}/月)</span>`;
            }).join("")
          : "<span class='tip'>なし</span>"}</div>
        ${s.optCostBonusScore > 0 ? `
        <div style="margin-top:8px; padding:8px; background:#f0fdf4; border:1px solid #86efac; border-radius:6px">
          <span style="font-weight:bold; color:#16a34a">🎉 ライフイベントボーナス ＋${s.optCostBonusScore}点</span>
          <div style="margin-top:4px; font-size:0.85em; color:#555">
            ${s.optCostBonusDetails.map(d => {
              const labelMap = { marriage:"結婚式・披露宴・新婚旅行", childbirth:"出産費用・育児準備", retirement:"退職後ライフスタイル整備", inheritance:"葬儀・相続手続き" };
              return `${labelMap[d.stopId] || d.stopId}: ＋${d.points}点`;
            }).join("　")}
          </div>
        </div>` : ""}
      </div>`;
  }).join("");

  app.innerHTML = `
    <h1>ゲーム終了 — 最終結果</h1>
    <div class="panel">
      <div class="panel-title">ランキング</div>
      ${rankingHtml}
      <div class="tip" style="margin-top:8px">スコア = 達成率 ＋ 達成ボーナス（達成枚数×10点）＋ ライフイベントボーナス（結婚+10 / 出産+5 / 定年+5 / 相続+8）－ 準備不足ペナルティ（赤字50万円ごとに-5点）</div>
    </div>
    ${playerDetails}
    <div style="text-align:center; margin-top:16px">
      <button class="btn-primary" onclick="restartGame()">もう一度プレイ</button>
    </div>`;
}

function restartGame() {
  S.phase = "setup"; S.gs = null; S.pIdx = 0;
  S.pendGoals = {}; S.pendIns = {}; S.pendOptCost = {};
  S.lastResult = null; S.rolled = false;
  render();
}

// Start
render();
</script>
</body>
</html>
